packages:
  - 'packages/*'
  - 'apps/*'

allowBuilds:
  '@nestjs/core': true
  bcrypt: true
  better-sqlite3: true
  esbuild: true
  msgpackr-extract: true
  protobufjs: true
  sharp: true

# These packages pull heavy native binaries.
# They are installed on-demand by rdk commands, not during workspace install.
neverBuiltDependencies:
  - '@xenova/transformers'
  - 'onnxruntime-node'
  - 'onnxruntime-web'
  - 'sharp'
  - 'ethers'

overrides:
  '@modelcontextprotocol/sdk': '1.12.1'
