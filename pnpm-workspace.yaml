packages:
  - 'packages/*'
  - 'apps/*'

# apps/desktop pulls the Electron toolchain (@electron/rebuild, electron-builder),
# which depends on @electron/node-gyp — Electron's git-forked node-gyp. Allow that
# legitimate git subdep through the supply-chain check.
blockExoticSubdeps: false

allowBuilds:
  '@nestjs/core': true
  bcrypt: true
  better-sqlite3: true
  esbuild: true
  electron: true
  msgpackr-extract: true
  protobufjs: true
  sharp: true

# These packages pull heavy native binaries.
# They are installed on-demand by rdk commands, not during workspace install.
neverBuiltDependencies:
  - '@xenova/transformers'
  - 'onnxruntime-node'
  - 'onnxruntime-web'
  - 'sharp'
  - 'ethers'

overrides:
  '@modelcontextprotocol/sdk': '1.12.1'
