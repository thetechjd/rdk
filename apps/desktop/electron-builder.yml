appId: ai.retrodeck.rdk.desktop
productName: RDK
copyright: Copyright © RetroDeck

# Native modules must live OUTSIDE the asar or their .node/.so can't be dlopen'd.
asar: true
asarUnpack:
  - "**/node_modules/better-sqlite3/**"
  - "**/node_modules/onnxruntime-node/**"
  - "**/node_modules/sharp/**"
  - "**/node_modules/@img/**"

files:
  - "out/**"
  - "package.json"
  # Trim TS sources from OUR OWN workspace packages only (they ship dist/).
  # NEVER use a blanket `**/node_modules/**/src` exclusion: plenty of real
  # packages ship their code in src/ — @xenova/transformers' entry point is
  # literally ./src/transformers.js, and stripping it broke the embedding model
  # with ERR_MODULE_NOT_FOUND.
  - "!**/node_modules/@rdk/*/{src,.turbo,tsconfig*.json}"

directories:
  buildResources: build
  output: release

# ── macOS — SHIPS. Requires Developer ID cert + notarization for a downloadable app.
#    Set CSC_LINK / CSC_KEY_PASSWORD and APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID
#    in the release environment. Without these, Gatekeeper blocks the .app (see docs/feasibility-report.md §6).
mac:
  category: public.app-category.productivity
  icon: build/icon.png   # electron-builder generates a proper .icns from this on the mac runner
  target:
    - dmg
    - zip
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Notarization stays off until Apple credentials are present. When ready, set
  # `notarize: true` here (under mac) and provide APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD
  # / APPLE_TEAM_ID in the environment.
  notarize: false

# ── Linux — SHIPS. No signing gate.
linux:
  category: Utility
  icon: build/icon.png
  target:
    - AppImage
    - deb
  maintainer: RetroDeck
  synopsis: RDK network node — file explorer + retrieval graph

# ── Windows — CONFIGURED, NOT SHIPPED until W1 native-rebuild is confirmed green in CI.
#    One flag away: `npm run dist:win`. Needs @electron/rebuild for better-sqlite3
#    and (recommended) an OV/EV Authenticode cert to clear SmartScreen.
win:
  icon: build/icon.ico
  target:
    - nsis
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
