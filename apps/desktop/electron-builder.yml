appId: ai.retrodeck.rdk.desktop
productName: RDK
copyright: Copyright © RetroDeck

# Native modules must live OUTSIDE the asar or their .node/.so can't be dlopen'd.
asar: true
asarUnpack:
  - "**/node_modules/better-sqlite3/**"
  - "**/node_modules/onnxruntime-node/**"
  - "**/node_modules/sharp/**"
  - "**/node_modules/@img/**"

files:
  - "out/**"
  - "package.json"
  # Trim TS sources from OUR OWN workspace packages only (they ship dist/).
  # NEVER use a blanket `**/node_modules/**/src` exclusion: plenty of real
  # packages ship their code in src/ — @xenova/transformers' entry point is
  # literally ./src/transformers.js, and stripping it broke the embedding model
  # with ERR_MODULE_NOT_FOUND.
  - "!**/node_modules/@rdk/*/{src,.turbo,tsconfig*.json}"

directories:
  buildResources: build
  output: release

# ── macOS — SHIPS. Signing + notarization are wired in the Desktop Release workflow
#    and turn on automatically when these repo secrets exist (see docs/signing.md):
#      CSC_LINK, CSC_KEY_PASSWORD           → Developer ID Application cert (signing)
#      APPLE_API_KEY_P8/_ID, APPLE_API_ISSUER → App Store Connect key (notarization)
#    Team: B6B5DGK88V. Without the secrets the build is unsigned (Gatekeeper blocks it
#    on other Macs) — see docs/feasibility-report.md §6.
mac:
  category: public.app-category.productivity
  icon: build/icon.png
  target:
    - dmg
    - zip
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Default OFF so unsigned builds need no Apple credentials. The workflow flips it on
  # per-run (RDK_MAC_NOTARIZE=true → -c.mac.notarize=true) once the secrets are set;
  # notarization then authenticates with the App Store Connect API key in
  # APPLE_API_KEY / APPLE_API_KEY_ID / APPLE_API_ISSUER (the key's issuer identifies
  # the team, so no teamId is needed for the API-key flow).
  notarize: false
# ── Linux — SHIPS. No signing gate.
linux:
  category: Utility
  icon: build/icon.png
  target:
    - AppImage
    - deb
  maintainer: RetroDeck
  synopsis: RDK network node — file explorer + retrieval graph

# ── Windows — CONFIGURED, NOT SHIPPED until W1 native-rebuild is confirmed green in CI.
#    One flag away: `npm run dist:win`. Needs @electron/rebuild for better-sqlite3
#    and (recommended) an OV/EV Authenticode cert to clear SmartScreen.
win:
  icon: build/icon.ico
  target:
    - nsis
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
