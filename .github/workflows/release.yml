name: Release

# Install is npm-based across all channels:
#   - npm:  npm install -g @retrodeck/rdk
#   - brew: formula installs @retrodeck/rdk from the npm registry (node@22)
#   - curl: install.sh installs @retrodeck/rdk@latest under a bundled Node
# So a release only needs to: publish to npm (done manually before tagging),
# then point the Homebrew formula at the new version. No standalone binaries.
#
# Release flow:
#   1. pnpm --filter @retrodeck/rdk publish   (manual, OTP-gated)
#   2. git tag vX.Y.Z && git push origin vX.Y.Z   → this workflow runs

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub release (notes only)
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Install

            **npm** (requires Node.js 20+):
            ```bash
            npm install -g @retrodeck/rdk
            ```

            **Homebrew:**
            ```bash
            brew tap thetechjd/rdk
            brew install rdk
            ```

            **macOS / Linux (curl — bundles its own Node):**
            ```bash
            curl -fsSL https://rdk.network/install.sh | bash
            ```

            **Windows (PowerShell — requires Node.js 20+):**
            ```powershell
            irm https://rdk.network/install.ps1 | iex
            ```

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/thetechjd/homebrew-rdk.git" tap

          export VERSION
          bash .github/scripts/write-formula.sh tap/Formula/rdk.rb

          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/rdk.rb
          git diff --staged --quiet || git commit -m "chore: bump rdk to v${VERSION}"
          git push
