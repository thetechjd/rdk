name: Release

# Install is npm-based across all channels:
#   - npm:  npm install -g @retrodeck/rdk
#   - brew: formula installs @retrodeck/rdk from the npm registry (node@22)
#   - curl: install.sh installs @retrodeck/rdk@latest under a bundled Node
# So a release is fully tag-driven — npm publish happens IN CI via npm trusted
# publishing (OIDC): no npm token exists anywhere. One-time setup on npmjs.com:
# package @retrodeck/rdk → Settings → Trusted Publisher → GitHub Actions →
# repository thetechjd/rdk, workflow release.yml. (2FA-bypass automation tokens
# lose direct-publish rights ~Jan 2027 — this is the successor path.)
#
# Release flow (end to end):
#   git tag vX.Y.Z && git push origin vX.Y.Z
#   → publish-npm (OIDC) → GitHub release → Homebrew formula update

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  publish-npm:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write   # npm trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4  # reads packageManager from package.json

      # NOTE: no registry-url here — setup-node's registry-url writes an .npmrc with
      # _authToken=${NODE_AUTH_TOKEN}, and with no token set npm fails with "Failed to
      # replace env in config" BEFORE attempting OIDC. Trusted publishing needs no
      # registry config: npm >= 11.5.1 detects the Actions OIDC environment itself.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Build the libs the CLI bundles
        run: |
          ( cd packages/rdk-core && npm run build )
          ( cd packages/rdk-node && npm run build )

      # Granular steps below: run-step conclusions are visible via the public jobs
      # API, so a failure names its stage even without log access.

      - name: Pin npm 11 (OIDC trusted publishing needs >= 11.5.1; avoid brand-new v12)
        run: |
          npm install -g npm@11
          npm --version

      - name: Verify OIDC token is available (id-token permission)
        run: |
          if [ -z "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            echo "No OIDC token request URL — id-token: write permission missing."
            exit 1
          fi
          echo "OIDC request URL present."

      - name: Skip if version already published (tag re-push)
        id: check
        working-directory: packages/rdk-cli
        run: |
          V=$(node -p 'require("./package.json").version')
          if [ "$(npm view "@retrodeck/rdk@$V" version 2>/dev/null)" ]; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "Version $V already on the registry — skipping publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish @retrodeck/rdk (trusted publishing — OIDC, no token)
        if: steps.check.outputs.published == 'false'
        working-directory: packages/rdk-cli
        run: npm publish --access public

  release:
    needs: publish-npm
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub release (notes only)
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Install

            **npm** (requires Node.js 20+):
            ```bash
            npm install -g @retrodeck/rdk
            ```

            **Homebrew:**
            ```bash
            brew tap thetechjd/rdk
            brew install rdk
            ```

            **macOS / Linux (curl — bundles its own Node):**
            ```bash
            curl -fsSL https://rdk.network/install.sh | bash
            ```

            **Windows (PowerShell — requires Node.js 20+):**
            ```powershell
            irm https://rdk.network/install.ps1 | iex
            ```

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/thetechjd/homebrew-rdk.git" tap

          export VERSION
          bash .github/scripts/write-formula.sh tap/Formula/rdk.rb

          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/rdk.rb
          git diff --staged --quiet || git commit -m "chore: bump rdk to v${VERSION}"
          git push
