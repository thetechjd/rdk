name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14          # Apple Silicon (arm64)
            pkg_target: node20-macos-arm64
            binary: rdk-macos-arm64
          # macos-13 (Intel) runner pool is near-deprecated and rarely picks up jobs.
          # Intel Mac users can install via npm. Re-enable if GitHub restores the pool.
          # - os: macos-13
          #   pkg_target: node20-macos-x64
          #   binary: rdk-macos-x64
          - os: ubuntu-22.04      # Linux x86_64
            pkg_target: node20-linux-x64
            binary: rdk-linux-x64
          - os: ubuntu-22.04-arm  # Linux arm64
            pkg_target: node20-linux-arm64
            binary: rdk-linux-arm64
          # Windows: @yao-pkg/pkg crashes on dynamic workspace imports (PE binary
          # patching bug). Windows users should install via npm for now.
          # - os: windows-latest
          #   pkg_target: node20-win-x64
          #   binary: rdk-win-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install workspace deps
        run: pnpm install

      - name: Cache pkg base binaries
        uses: actions/cache@v4
        with:
          path: ~/.pkg-cache
          key: pkg-cache-${{ matrix.pkg_target }}-node20.20.2

      - name: Build workspace dependencies
        run: |
          pnpm --filter @rdk/core build
          pnpm --filter @retrodeck/mcp build
          pnpm --filter @retrodeck/x402 build
          pnpm --filter "@retrodeck/adapter-filesystem" build
          pnpm --filter "@retrodeck/adapter-obsidian" build

      - name: Build JS bundle
        working-directory: packages/rdk-cli
        shell: bash
        run: |
          ./node_modules/esbuild/bin/esbuild src/cli.ts \
            --bundle --platform=node --format=cjs --target=node20 \
            --outfile=dist/cli.js \
            --external:@xenova/transformers --external:ethers \
            --external:@retrodeck/adapter-obsidian --external:@retrodeck/adapter-filesystem \
            --external:@retrodeck/adapter-logseq --external:@retrodeck/adapter-notion \
            --external:@retrodeck/mcp --external:@retrodeck/x402 \
            --external:@modelcontextprotocol/sdk \
            --external:better-sqlite3 --external:chokidar --external:ws \
            --banner:js="#!/usr/bin/env node"

      - name: Prep native deps (rebuild better-sqlite3 for node20)
        working-directory: packages/rdk-cli
        run: node scripts/pkg-prep.js

      - name: Build pkg binary (${{ matrix.binary }})
        working-directory: packages/rdk-cli
        run: |
          mkdir -p dist/binaries
          node node_modules/@yao-pkg/pkg/lib-es5/bin.js dist/cli.js \
            --targets ${{ matrix.pkg_target }} \
            --output dist/binaries/${{ matrix.binary }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: packages/rdk-cli/dist/binaries/${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist/binaries

      - name: Flatten artifact dirs + compress
        run: |
          mkdir -p release-assets
          for dir in dist/binaries/*/; do
            name=$(basename "$dir")
            cp "$dir/$name" "release-assets/$name"
            [[ "$name" == *.exe ]] || chmod +x "release-assets/$name"
          done
          cd release-assets
          for f in rdk-*; do
            tar -czf "${f}.tar.gz" "$f"
            sha256sum "${f}.tar.gz" >> SHA256SUMS
          done
          cat SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.tar.gz
            release-assets/SHA256SUMS
          body: |
            ## Install

            **macOS / Linux (recommended):**
            ```bash
            curl -fsSL https://rdk.network/install.sh | bash
            ```

            **Homebrew:**
            ```bash
            brew tap thetechjd/rdk
            brew install rdk
            ```

            **npm (requires Node.js 20+):**
            ```bash
            npm install -g @retrodeck/rdk
            ```

            **Manual:** download the binary for your platform below, `chmod +x` (macOS/Linux), and place in your `$PATH`.

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BASE_URL="https://github.com/thetechjd/rdk/releases/download/${GITHUB_REF_NAME}"

          MAC_ARM_SHA=$(grep rdk-macos-arm64.tar.gz release-assets/SHA256SUMS | awk '{print $1}')
          MAC_X64_SHA=$(grep rdk-macos-x64.tar.gz   release-assets/SHA256SUMS | awk '{print $1}')
          LNX_X64_SHA=$(grep rdk-linux-x64.tar.gz   release-assets/SHA256SUMS | awk '{print $1}')
          LNX_ARM_SHA=$(grep rdk-linux-arm64.tar.gz release-assets/SHA256SUMS | awk '{print $1}')

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/thetechjd/homebrew-rdk.git" tap

          export VERSION BASE_URL MAC_ARM_SHA MAC_X64_SHA LNX_X64_SHA LNX_ARM_SHA
          bash .github/scripts/write-formula.sh tap/Formula/rdk.rb

          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/rdk.rb
          git diff --staged --quiet || git commit -m "chore: bump rdk to v${VERSION}"
          git push
