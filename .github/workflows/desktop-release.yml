name: Desktop Release

# Builds the RDK desktop app (apps/desktop) into installable artifacts:
#   - macOS   → .dmg + .zip     (arm64 on macos-latest)
#   - Linux   → .AppImage + .deb (x64 on ubuntu-latest)
#   - Windows → .exe (nsis)      (x64 on windows-latest)
#
# Native modules (better-sqlite3) can't be cross-compiled, so each installer is built
# on its own OS runner. Windows-latest carries the MSVC toolchain that @electron/rebuild
# needs. The Windows .exe is UNSIGNED — installable, but shows a one-time SmartScreen
# "unknown publisher" prompt until an Authenticode cert is added (report §6, W-analog).
#
# All the tricky packaging logic (pnpm deploy → symlink-free app dir →
# electron-rebuild → electron-builder, invoked via `node` not `pnpm exec` to avoid
# a devDep-pruning deps-status check) lives in apps/desktop/scripts/package.sh.
#
# NOTE: cross-arch is not covered — each runner builds for its own CPU arch
# (macos-latest = arm64, ubuntu-latest/windows-latest = x64). Add matrix entries
# (macos-13 → x64, ubuntu-24.04-arm → linux-arm64) when those targets are needed.
#
# macOS signing + notarization are AUTOMATIC when these five repo secrets exist;
# without them the mac build is UNSIGNED (and hits Gatekeeper on other Macs), exactly
# as before. See apps/desktop/docs/signing.md for how to produce them.
#   CSC_LINK            base64 of the Developer ID Application .p12   (signing)
#   CSC_KEY_PASSWORD    that .p12's export password                  (signing)
#   APPLE_API_KEY_P8    full text of the AuthKey_XXXX.p8             (notarization)
#   APPLE_API_KEY_ID    the .p8 key id                               (notarization)
#   APPLE_API_ISSUER    App Store Connect issuer UUID                (notarization)

# Windows signing (Azure Trusted Signing) is AUTOMATIC when these repo secrets exist;
# without them the .exe is UNSIGNED (installable, one SmartScreen prompt). See signing.md.
#   AZURE_TENANT_ID / AZURE_CLIENT_ID / AZURE_CLIENT_SECRET   Entra service principal (auth)
#   AZURE_CODE_SIGNING_ENDPOINT   region URI e.g. https://eus.codesigning.azure.net/
#   AZURE_CODE_SIGNING_ACCOUNT    Trusted Signing account name
#   AZURE_CERT_PROFILE            certificate profile name

on:
  workflow_dispatch:
    inputs:
      mac_notarize:
        description: 'Notarize the macOS build. Slow (Apple queue). Set false for a fast signed-only build to hand to testers.'
        type: boolean
        default: true
  push:
    tags:
      - 'desktop-v*.*.*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: '--mac'
          - os: ubuntu-latest
            target: '--linux'
          - os: windows-latest
            target: '--win'
    runs-on: ${{ matrix.os }}
    env:
      # Mapped from repo secrets. Harmless/ignored on the Linux runner; consumed by
      # electron-builder on macOS. APPLE_API_KEY itself is NOT set here — it must be a
      # FILE PATH, which the "Prepare macOS signing" step writes from APPLE_API_KEY_P8.
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      # Azure Trusted Signing auth (Entra service principal). electron-builder reads
      # these directly during the Windows sign; ignored on mac/linux.
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      # Sign + notarize only when the secrets exist; otherwise build unsigned (the
      # prior behaviour). No secret ever reaches the Linux runner's build.
      - name: Prepare macOS signing & notarization
        if: runner.os == 'macOS'
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          # Empty on tag pushes (→ notarize). The dispatch toggle can set it 'false'
          # to get a fast signed-only build for testers (Apple's notary queue is slow).
          MAC_NOTARIZE: ${{ github.event.inputs.mac_notarize }}
        run: |
          if [ -n "$CSC_LINK" ] && [ -n "$APPLE_API_KEY_P8" ] && [ -n "$APPLE_API_KEY_ID" ]; then
            KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
            # notarytool needs the raw PEM .p8. Accept the secret either as raw PEM
            # text OR base64-encoded (a common mistake — people base64 it like the
            # .p12) and normalize to real PEM here.
            if printf '%s' "$APPLE_API_KEY_P8" | grep -q 'BEGIN PRIVATE KEY'; then
              printf '%s' "$APPLE_API_KEY_P8" > "$KEY_PATH"
            else
              printf '%s' "$APPLE_API_KEY_P8" | openssl base64 -d -A > "$KEY_PATH"
            fi
            if ! grep -q 'BEGIN PRIVATE KEY' "$KEY_PATH"; then
              echo "::error::APPLE_API_KEY_P8 is neither a valid .p8 PEM nor valid base64 of one (expected -----BEGIN PRIVATE KEY-----). Re-add the secret as the raw contents of AuthKey_XXXX.p8."
              exit 1
            fi
            echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"
            if [ "$MAC_NOTARIZE" = "false" ]; then
              echo "Signing credentials present → sign only (notarization skipped by dispatch input). Testers open via right-click → Open."
            else
              echo "Signing credentials present → sign + notarize."
              echo "RDK_MAC_NOTARIZE=true" >> "$GITHUB_ENV"
            fi
          else
            echo "No signing secrets → building UNSIGNED."
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
          fi

      # Windows Azure Trusted Signing — sign only when the secrets exist; otherwise the
      # .exe is unsigned (installable, one-time SmartScreen prompt). The endpoint/account/
      # profile are non-secret config; the auth SP vars are set at job level above.
      - name: Prepare Windows signing (Azure Trusted Signing)
        if: runner.os == 'Windows'
        shell: bash
        env:
          AZURE_CODE_SIGNING_ENDPOINT: ${{ secrets.AZURE_CODE_SIGNING_ENDPOINT }}
          AZURE_CODE_SIGNING_ACCOUNT: ${{ secrets.AZURE_CODE_SIGNING_ACCOUNT }}
          AZURE_CERT_PROFILE: ${{ secrets.AZURE_CERT_PROFILE }}
        run: |
          if [ -n "$AZURE_CLIENT_SECRET" ] && [ -n "$AZURE_CODE_SIGNING_ENDPOINT" ] && [ -n "$AZURE_CODE_SIGNING_ACCOUNT" ] && [ -n "$AZURE_CERT_PROFILE" ]; then
            echo "Azure Trusted Signing configured → signing Windows build."
            {
              echo "RDK_WIN_AZURE_SIGN=true"
              echo "RDK_WIN_AZURE_ENDPOINT=$AZURE_CODE_SIGNING_ENDPOINT"
              echo "RDK_WIN_AZURE_ACCOUNT=$AZURE_CODE_SIGNING_ACCOUNT"
              echo "RDK_WIN_AZURE_PROFILE=$AZURE_CERT_PROFILE"
            } >> "$GITHUB_ENV"
          else
            echo "No Azure signing secrets → building UNSIGNED Windows .exe (SmartScreen 'unknown publisher')."
          fi

      - uses: pnpm/action-setup@v4  # reads packageManager from package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace (with devDeps — needed to build)
        run: pnpm install --frozen-lockfile

      # RUNNER_TEMP is a backslash path on Windows (D:\a\_temp) that neither Git Bash
      # nor Windows Node handle raw. cygpath -m yields the drive-letter/forward-slash
      # form (D:/a/_temp) that BOTH accept; pin the deploy dir to it for every step.
      - name: Compute deploy dir
        shell: bash
        run: |
          if command -v cygpath >/dev/null 2>&1; then
            echo "RDK_DEPLOY_DIR=$(cygpath -m "$RUNNER_TEMP")/rdk-desktop-deploy" >> "$GITHUB_ENV"
          else
            echo "RDK_DEPLOY_DIR=$RUNNER_TEMP/rdk-desktop-deploy" >> "$GITHUB_ENV"
          fi

      - name: Build installers
        shell: bash
        run: bash apps/desktop/scripts/package.sh ${{ matrix.target }}

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist-out
          find "$RDK_DEPLOY_DIR/release" -maxdepth 1 \
            \( -name '*.dmg' -o -name '*.zip' -o -name '*.AppImage' -o -name '*.deb' -o -name '*.exe' \) \
            -exec cp {} dist-out/ \;
          ls -la dist-out

      - uses: actions/upload-artifact@v4
        with:
          name: rdk-desktop-${{ matrix.os }}
          path: dist-out/*
          if-no-files-found: error

      # On a desktop-vX.Y.Z tag, also attach installers to a GitHub release.
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-out/*
