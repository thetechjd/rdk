name: Desktop Release

# Builds the RDK desktop app (apps/desktop) into installable artifacts:
#   - macOS  → .dmg + .zip     (arm64 on macos-latest)
#   - Linux  → .AppImage + .deb (x64 on ubuntu-latest)
#
# All the tricky packaging logic (pnpm deploy → symlink-free app dir →
# electron-rebuild → electron-builder, invoked via `node` not `pnpm exec` to avoid
# a devDep-pruning deps-status check) lives in apps/desktop/scripts/package.sh,
# which is validated locally. This workflow just installs and runs it.
#
# NOTE: cross-arch is not covered — each runner builds for its own CPU arch
# (macos-latest = arm64, ubuntu-latest = x64). Add matrix entries (macos-13 → x64,
# ubuntu-24.04-arm → linux-arm64) when those targets are needed.
#
# macOS signing + notarization are AUTOMATIC when these five repo secrets exist;
# without them the mac build is UNSIGNED (and hits Gatekeeper on other Macs), exactly
# as before. See apps/desktop/docs/signing.md for how to produce them.
#   CSC_LINK            base64 of the Developer ID Application .p12   (signing)
#   CSC_KEY_PASSWORD    that .p12's export password                  (signing)
#   APPLE_API_KEY_P8    full text of the AuthKey_XXXX.p8             (notarization)
#   APPLE_API_KEY_ID    the .p8 key id                               (notarization)
#   APPLE_API_ISSUER    App Store Connect issuer UUID                (notarization)

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'desktop-v*.*.*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: '--mac'
          - os: ubuntu-latest
            target: '--linux'
    runs-on: ${{ matrix.os }}
    env:
      # Mapped from repo secrets. Harmless/ignored on the Linux runner; consumed by
      # electron-builder on macOS. APPLE_API_KEY itself is NOT set here — it must be a
      # FILE PATH, which the "Prepare macOS signing" step writes from APPLE_API_KEY_P8.
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
    steps:
      - uses: actions/checkout@v4

      # Sign + notarize only when the secrets exist; otherwise build unsigned (the
      # prior behaviour). No secret ever reaches the Linux runner's build.
      - name: Prepare macOS signing & notarization
        if: runner.os == 'macOS'
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          if [ -n "$CSC_LINK" ] && [ -n "$APPLE_API_KEY_P8" ] && [ -n "$APPLE_API_KEY_ID" ]; then
            echo "Signing credentials present → sign + notarize."
            KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
            printf '%s' "$APPLE_API_KEY_P8" > "$KEY_PATH"
            echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"
            echo "RDK_MAC_NOTARIZE=true"   >> "$GITHUB_ENV"
          else
            echo "No signing secrets → building UNSIGNED."
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
          fi

      - uses: pnpm/action-setup@v4  # reads packageManager from package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace (with devDeps — needed to build)
        run: pnpm install --frozen-lockfile

      - name: Build installers
        shell: bash
        run: bash apps/desktop/scripts/package.sh ${{ matrix.target }}

      - name: Collect artifacts
        shell: bash
        # package.sh defaults its deploy dir to $RUNNER_TEMP/rdk-desktop-deploy
        # (GitHub sets RUNNER_TEMP automatically).
        run: |
          mkdir -p dist-out
          find "$RUNNER_TEMP/rdk-desktop-deploy/release" -maxdepth 1 \
            \( -name '*.dmg' -o -name '*.zip' -o -name '*.AppImage' -o -name '*.deb' \) \
            -exec cp {} dist-out/ \;
          ls -la dist-out

      - uses: actions/upload-artifact@v4
        with:
          name: rdk-desktop-${{ matrix.os }}
          path: dist-out/*
          if-no-files-found: error

      # On a desktop-vX.Y.Z tag, also attach installers to a GitHub release.
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-out/*
