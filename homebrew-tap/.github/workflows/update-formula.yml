name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.2.3)'
        required: true
      mac_arm64_sha:
        description: 'SHA256 for rdk-macos-arm64.tar.gz'
        required: true
      mac_x64_sha:
        description: 'SHA256 for rdk-macos-x64.tar.gz'
        required: true
      linux_x64_sha:
        description: 'SHA256 for rdk-linux-x64.tar.gz'
        required: true
      linux_arm64_sha:
        description: 'SHA256 for rdk-linux-arm64.tar.gz'
        required: true

jobs:
  update:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve inputs
        id: inputs
        run: |
          VERSION="${{ github.event.inputs.version || github.event.client_payload.version }}"
          MAC_ARM="${{ github.event.inputs.mac_arm64_sha || github.event.client_payload.mac_arm64_sha }}"
          MAC_X64="${{ github.event.inputs.mac_x64_sha || github.event.client_payload.mac_x64_sha }}"
          LNX_X64="${{ github.event.inputs.linux_x64_sha || github.event.client_payload.linux_x64_sha }}"
          LNX_ARM="${{ github.event.inputs.linux_arm64_sha || github.event.client_payload.linux_arm64_sha }}"
          echo "version=$VERSION"    >> $GITHUB_OUTPUT
          echo "mac_arm=$MAC_ARM"    >> $GITHUB_OUTPUT
          echo "mac_x64=$MAC_X64"    >> $GITHUB_OUTPUT
          echo "lnx_x64=$LNX_X64"   >> $GITHUB_OUTPUT
          echo "lnx_arm=$LNX_ARM"   >> $GITHUB_OUTPUT

      - name: Update formula
        env:
          VERSION: ${{ steps.inputs.outputs.version }}
          BASE_URL: https://github.com/thetechjd/rdk/releases/download/v${{ steps.inputs.outputs.version }}
          MAC_ARM:  ${{ steps.inputs.outputs.mac_arm }}
          MAC_X64:  ${{ steps.inputs.outputs.mac_x64 }}
          LNX_X64:  ${{ steps.inputs.outputs.lnx_x64 }}
          LNX_ARM:  ${{ steps.inputs.outputs.lnx_arm }}
        run: |
          cat > Formula/rdk.rb <<FORMULA
          class Rdk < Formula
            desc "Retrieval Development Kit — distributed knowledge infrastructure"
            homepage "https://rdk.network"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "${BASE_URL}/rdk-macos-arm64.tar.gz"
                sha256 "${MAC_ARM}"
              end
              on_intel do
                url "${BASE_URL}/rdk-macos-x64.tar.gz"
                sha256 "${MAC_X64}"
              end
            end

            on_linux do
              on_arm do
                url "${BASE_URL}/rdk-linux-arm64.tar.gz"
                sha256 "${LNX_ARM}"
              end
              on_intel do
                url "${BASE_URL}/rdk-linux-x64.tar.gz"
                sha256 "${LNX_X64}"
              end
            end

            def install
              binary = "rdk-\#{OS.mac? ? 'macos' : 'linux'}-\#{Hardware::CPU.arm? ? 'arm64' : 'x64'}"
              bin.install binary => "rdk"
            end

            test do
              assert_match version.to_s, shell_output("\#{bin}/rdk --version")
            end
          end
          FORMULA

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/rdk.rb
          git diff --staged --quiet || git commit -m "chore: bump rdk to v${{ steps.inputs.outputs.version }}"
          git push
